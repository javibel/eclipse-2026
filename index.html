<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eclipse Total · 12.08.2026 · ¿te vienes?</title>

  <!-- Open Graph (Facebook, WhatsApp, LinkedIn, etc.) -->
  <meta property="og:title" content="Eclipse Total · 12.08.2026 · ¿te vienes?">
  <meta property="og:description" content="Un minuto 45 segundos que no vuelven a pasar en nuestras vidas. Tierra de Campos, Castilla y León.">
  <meta property="og:image" content="https://eclipse-2026-kappa.vercel.app/og-image.jpg">
  <meta property="og:url" content="https://eclipse-2026-kappa.vercel.app">
  <meta property="og:type" content="website">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Eclipse Total · 12.08.2026 · ¿te vienes?">
  <meta name="twitter:description" content="Un minuto 45 segundos que no vuelven a pasar en nuestras vidas.">
  <meta name="twitter:image" content="https://eclipse-2026-kappa.vercel.app/og-image.jpg">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a14; }

    /* Pantalla de entrada */
    #splash {
      position: fixed;
      inset: 0;
      z-index: 999999;
      background: #0a0a14;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: opacity 0.6s ease;
    }

    #splash img {
      max-width: 90vw;
      max-height: 85vh;
      object-fit: contain;
      filter: drop-shadow(0 0 60px rgba(255, 179, 59, 0.3));
    }

    #splash .enter-text {
      color: #f3ead4;
      font-family: serif;
      font-style: italic;
      font-size: 24px;
      letter-spacing: 2px;
      margin-top: 20px;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    #splash.hidden {
      opacity: 0;
      pointer-events: none;
    }

    iframe {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: none;
      z-index: 1;
    }

    #mute-btn {
      position: fixed;
      top: 11px;
      left: 166px;
      z-index: 99999;
      background: transparent;
      border: none;
      color: #f3ead4;
      padding: 6px 10px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      box-shadow: none;
      transition: all 0.3s ease;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #mute-btn:hover {
      background: transparent;
      transform: scale(1.1);
    }
  </style>
</head>
<body>

  <!-- Pantalla de entrada -->
  <div id="splash">
    <img src="mahou-eclipse.png" alt="Cañas Largas patrocina - Eclipse 2026">
    <div class="enter-text">Toca para entrar</div>
  </div>

  <!-- Audio de fondo en bucle -->
  <audio id="bg-music" loop preload="auto">
    <source src="cielo-roto.mp3" type="audio/mpeg">
  </audio>

  <!-- Boton de silenciar -->
  <button id="mute-btn" title="Silenciar">🔊</button>

  <!-- Web original completa (se carga tras el splash) -->
  <iframe id="main-frame"></iframe>

  <script>
    const audio = document.getElementById('bg-music');
    const btn = document.getElementById('mute-btn');
    const splash = document.getElementById('splash');

    audio.volume = 0.35;

    const frame = document.getElementById('main-frame');

    // Click en splash: carga la web, inicia música, oculta splash
    splash.addEventListener('click', function() {
      audio.play();
      frame.src = 'eclipse.html';
      splash.classList.add('hidden');
      setTimeout(function() {
        splash.style.display = 'none';
      }, 600);
    });

    // Botón mute
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      audio.muted = !audio.muted;
      if (audio.muted) {
        btn.textContent = '🔇';
        btn.title = 'Activar música';
      } else {
        btn.textContent = '🔊';
        btn.title = 'Silenciar';
      }
    });
  </script>

</body>
</html>
