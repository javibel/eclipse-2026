<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eclipse Total · 12.08.2026 · ¿te vienes?</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a14; }

    iframe {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: none;
      z-index: 1;
    }

    #mute-btn {
      position: fixed;
      top: 16px;
      left: 116px;
      z-index: 99999;
      background: transparent;
      border: none;
      color: #f3ead4;
      padding: 6px 10px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      box-shadow: none;
      transition: all 0.3s ease;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #mute-btn:hover {
      background: transparent;
      transform: scale(1.1);
    }
  </style>
</head>
<body>

  <!-- Audio de fondo en bucle -->
  <audio id="bg-music" loop preload="auto">
    <source src="cielo-roto.mp3" type="audio/mpeg">
  </audio>

  <!-- Boton de silenciar -->
  <button id="mute-btn" title="Activar música">🔊</button>

  <!-- Web original completa -->
  <iframe src="eclipse.html"></iframe>

  <script>
    const audio = document.getElementById('bg-music');
    const btn = document.getElementById('mute-btn');
    let playing = false;

    audio.volume = 0.35;

    btn.addEventListener('click', function() {
      if (!playing) {
        audio.play();
        btn.textContent = '🔇';
        btn.title = 'Silenciar';
        playing = true;
      } else {
        audio.muted = !audio.muted;
        if (audio.muted) {
          btn.textContent = '🔊';
          btn.title = 'Activar música';
        } else {
          btn.textContent = '🔇';
          btn.title = 'Silenciar';
        }
      }
    });
  </script>

</body>
</html>
